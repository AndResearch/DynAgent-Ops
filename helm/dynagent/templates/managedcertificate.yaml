{{- if and .Values.ingress.enabled .Values.ingress.managedCertificate.enabled -}}
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: {{ .Values.ingress.managedCertificate.name | quote }}
  labels:
    {{- include "dynagent.labels" . | nindent 4 }}
spec:
  domains:
    {{- range .Values.ingress.managedCertificate.domains }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
