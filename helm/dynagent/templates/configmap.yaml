apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dynagent.fullname" . }}-config
  labels:
    {{- include "dynagent.labels" . | nindent 4 }}
data:
  # Application settings
  LOG_LEVEL: {{ .Values.config.logLevel | default "INFO" | quote }}
  ENVIRONMENT: {{ .Values.global.environment | default "development" | quote }}

  {{- if .Values.config.llm }}
  # LLM settings (DynAgent Settings)
  DYNAGENT_DEFAULT_LLM_PROVIDER: {{ .Values.config.llm.provider | default "anthropic" | quote }}
  {{- if .Values.config.llmProviders }}
  DYNAGENT_LLM_PROVIDERS: {{ .Values.config.llmProviders | toJson | quote }}
  {{- end }}
  # Legacy keys (unused by current backend)
  LLM_PROVIDER: {{ .Values.config.llm.provider | default "openai" | quote }}
  LLM_MODEL: {{ .Values.config.llm.model | default "gpt-4" | quote }}
  {{- end }}

  {{- range $key, $value := .Values.config.extra }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
