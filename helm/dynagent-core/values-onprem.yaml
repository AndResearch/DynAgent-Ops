# Phase 6 Task 6d on-prem overrides for dynagent-core.
#
# Minimal differences vs values.yaml — on-prem environments tend to
# run a single replica + scale manually.

global:
  environment: production

app:
  replicaCount: 1

autoscaling:
  enabled: false

# On-prem still wants a PodDisruptionBudget for drain operations even
# at replicaCount=1, but use maxUnavailable=0 so a drain blocks rather
# than evicts when running on a single replica.
pdb:
  enabled: true
  minAvailable: 1
