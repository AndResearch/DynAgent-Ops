apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dynagent-core.fullname" . }}-config
  labels:
    {{- include "dynagent-core.labels" . | nindent 4 }}
data:
  DYNAGENT_CORE_PORT: {{ .Values.config.port | quote }}
  GHCRTS: {{ .Values.config.ghcRts | quote }}
  {{- if .Values.config.otlpEndpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otlpEndpoint | quote }}
  {{- end }}
